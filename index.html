<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Spectrum 3D – Wonderland Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!--
        Wonderland Engine Runtime – injected by the WLE editor when packaging.
        Replace the placeholders below with the actual runtime and scene files
        generated by the Wonderland Engine editor's "Package" step.

        Expected files after packaging:
          WonderlandRuntime.js       – WASM + JS runtime
          WonderlandRuntime.wasm     – compiled engine WASM binary
          AudioSpectrum3D.bin        – packed scene / asset bundle
    -->
    <script type="module">
        /* global WL */

        /**
         * Dynamically load the Wonderland Engine runtime and start the project.
         *
         * When opened locally (file://) or served from a static host after
         * running "Package Project" in the Wonderland Editor, all four files
         * listed above must reside in the same directory as this HTML file.
         *
         * Note: the packaged bundle filename is set by the WLE editor during
         * the "Package" step. The filename below matches the default naming
         * convention used by the WLE editor (project name + "-bundle.js").
         */
        import {loadRuntime} from './WonderlandRuntime.js';

        loadRuntime('WonderlandRuntime', {
            simd: true,
            threads: true,
            canvas: 'canvas',
        }).then((engine) => {
            /* The editor-generated bundle registers our components: */
            import('./AudioSpectrum3D-bundle.js').then(() => {
                engine.loadMainSceneFromURL('AudioSpectrum3D.bin');
            });
        });
    </script>
</body>
</html>
